<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1118"/>
      <stop offset="100%" stop-color="#1c2838"/>
    </linearGradient>
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.65; }
        50% { opacity: 1; }
      }
      .rotor {
        animation: spin 1.7s linear infinite;
        transform-origin: 100px 100px;
      }
      .pulse {
        animation: pulse 1.4s ease-in-out infinite;
      }
    </style>
  </defs>

  <rect width="200" height="200" rx="24" fill="url(#bg)"/>

  <g class="rotor" stroke="#7fd3ff" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M100 18 A82 82 0 0 1 172 100"/>
    <path d="M100 182 A82 82 0 0 1 28 100"/>
    <circle cx="100" cy="18" r="4" fill="#7fd3ff" stroke="none"/>
    <circle cx="100" cy="182" r="4" fill="#7fd3ff" stroke="none"/>
  </g>

  <g class="pulse" transform="translate(100 100)">
    <ellipse cx="0" cy="-16" rx="36" ry="30" fill="#f2f6fb"/>
    <rect x="-24" y="4" width="48" height="34" rx="8" fill="#f2f6fb"/>

    <circle cx="-14" cy="-18" r="8" fill="#152033"/>
    <circle cx="14" cy="-18" r="8" fill="#152033"/>
    <path d="M0 -8 L7 2 H-7 Z" fill="#152033"/>

    <rect x="-17" y="18" width="6" height="10" rx="2" fill="#152033"/>
    <rect x="-6" y="18" width="6" height="10" rx="2" fill="#152033"/>
    <rect x="5" y="18" width="6" height="10" rx="2" fill="#152033"/>
    <rect x="16" y="18" width="6" height="10" rx="2" fill="#152033"/>
  </g>
</svg>