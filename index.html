<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Top 100 Everything</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Jost:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="app-shell">
      <header class="hero">
        <p class="kicker">Theme</p>
        <h1>The Top 100 Everything</h1>
        <p class="subtitle">
          A random board of 100 cool picks from music, movies, sports,
          entertainment, politics, tech, culture, science, and beyond.
        </p>
        <p id="statusMsg" class="status" aria-live="polite"></p>
        <button id="rerollBtn" type="button">Remix the 100</button>
      </header>

      <section class="grid-wrap" aria-label="Top 100 list">
        <div id="topGrid" class="top-grid"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
