<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ListFlair</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Jost:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="public/logos/listflair-favicon.svg" />
    <link rel="shortcut icon" href="public/logos/listflair-favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="public/logos/listflair-favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="public/logos/listflair-apple-touch-icon.png" />
    <link rel="manifest" href="public/site.webmanifest" />
    <meta name="theme-color" content="#0d1117" />
    <meta property="og:title" content="ListFlair" />
    <meta property="og:description" content="Curate. Rank. Reveal." />
    <meta property="og:url" content="__SITE_ORIGIN__/" />
    <meta property="og:image" content="__SITE_ORIGIN__/public/logos/listflair-social-share.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ListFlair" />
    <meta name="twitter:description" content="Curate. Rank. Reveal." />
    <meta name="twitter:image" content="__SITE_ORIGIN__/public/logos/listflair-social-share.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="app-shell">
      <header class="hero">
        <h1 class="visually-hidden">ListFlair</h1>
        <img
          class="hero-logo"
          src="public/logos/listflair-header-lockup-tight.svg"
          alt="ListFlair"
          width="1200"
          height="280"
        />
        <p class="subtitle">
          A living board of standout picks from music, movies, sports,
          entertainment, politics, tech, culture, science, and beyond.
        </p>
        <p id="statusMsg" class="status" aria-live="polite"></p>
        <div class="hero-actions">
          <button id="installBtn" class="button-deco" type="button" hidden>
            <span class="button-deco__label">INSTALL</span>
          </button>
        </div>
      </header>

      <section class="grid-wrap" aria-label="ListFlair list">
        <div id="topGrid" class="top-grid"></div>
      </section>

      <div id="editModal" class="detail-modal" hidden>
        <div class="detail-modal__backdrop" data-modal-close></div>
        <section
          class="detail-modal__panel"
          role="dialog"
          aria-modal="true"
          aria-labelledby="detailModalTitle"
        >
          <button class="detail-modal__close" type="button" data-modal-close aria-label="Close item details">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
          <div class="detail-modal__media">
            <img id="detailModalImage" class="detail-modal__image" src="/image-loading.svg" alt="Loading item image" />
          </div>
          <div class="detail-modal__body">
            <p id="detailModalRank" class="detail-modal__rank"></p>
            <h2 id="detailModalTitle" class="detail-modal__title">Item</h2>
            <p id="detailModalCategory" class="detail-modal__category">Category</p>
            <div class="detail-modal__fields">
              <label class="detail-modal__field">
                <span>Name</span>
                <input id="detailModalTitleInput" type="text" maxlength="200" />
              </label>
              <label class="detail-modal__field">
                <span>Category</span>
                <input id="detailModalCategoryInput" type="text" maxlength="80" />
              </label>
            </div>
            <div class="detail-modal__actions" aria-label="Item actions">
              <button id="modalRefreshBtn" class="detail-action detail-action--refresh" type="button" aria-label="Find image" title="Find image"></button>
              <button id="modalImageToggleBtn" class="detail-action detail-action--image" type="button" aria-label="Show image" title="Show image"></button>
              <button id="modalSearchBtn" class="detail-action detail-action--search" type="button" aria-label="Search for image" title="Search for image" aria-expanded="false" aria-controls="modalSearchPanel"></button>
              <button id="modalDeleteBtn" class="detail-action detail-action--delete" type="button" aria-label="Delete item" title="Delete item"></button>
            </div>
            <div id="modalSearchPanel" class="detail-modal__search-panel" hidden>
              <div class="detail-modal__search-form">
                <input id="modalSearchInput" class="detail-modal__search-input" type="search" placeholder="Search for images…" maxlength="200" autocomplete="off" />
                <button id="modalSearchSubmit" class="detail-modal__search-submit" type="button" aria-label="Search">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                  </svg>
                </button>
              </div>
              <div id="modalSearchResults" class="detail-modal__search-results" aria-live="polite" aria-label="Image search results"></div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
